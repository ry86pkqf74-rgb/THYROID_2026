name: Dashboard CI — Hardened

# ─────────────────────────────────────────────────────────────────────────────
# THYROID_2026  CI  |  Updated 2026-03-14
#
# Job graph (simplified):
#   lint-and-syntax
#       └─ unit-tests
#       └─ motherduck-ci (gated on MD secret)
#               ├─ canonical tables / metric bounds / null checks / smoke (existing)
#               ├─ benchmark-regression  (new)
#               └─ share-publication-check  (new, on tagged releases)
#
# Service-account token
# ─────────────────────
# Store the service-account MotherDuck token as the GitHub Actions secret
# MD_SA_TOKEN (separate from the personal MOTHERDUCK_TOKEN secret).
# Scripts that need automation-safe auth call client.for_env(..., sa=True),
# which prefers MD_SA_TOKEN over MOTHERDUCK_TOKEN.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "dashboard.py"
      - "motherduck_client.py"
      - "requirements.txt"
      - "scripts/**"
      - "app/**"
      - "utils/**"
      - "notes_extraction/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  # Allow manual triggering for release promotion checks
  workflow_dispatch:
    inputs:
      run_share_check:
        description: "Run share publication check"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  # ── Job 1: Static Analysis ─────────────────────────────────────────────────
  lint-and-syntax:
    name: Syntax / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check — dashboard.py
        run: python -m py_compile dashboard.py && echo "dashboard.py OK"

      - name: Syntax check — all scripts
        run: |
          fail=0
          for f in scripts/*.py app/*.py utils/*.py notes_extraction/*.py; do
            python -m py_compile "$f" 2>&1 || { echo "FAIL: $f"; fail=1; }
          done
          exit $fail

      - name: Import check
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('dashboard', 'dashboard.py'); print('Imports resolve OK')"

      - name: pyflakes lint — critical modules
        run: |
          pip install pyflakes -q
          python -m pyflakes dashboard.py motherduck_client.py || true

      # ── NEW: MATERIALIZATION_MAP duplicate check (no MD token required) ──
      - name: MAP dedup validation (no token needed)
        run: |
          python scripts/94_map_dedup_validator.py
          echo "MAP dedup check: exit $?"

  # ── Job 2: Unit tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: |
          pip install pytest -q
          python -m pytest tests/ -x -q --tb=short 2>&1 | tail -40

  # ── Job 3: MotherDuck Integration Checks (gated on secret) ────────────────
  motherduck-ci:
    name: MotherDuck Integration
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    # NOTE: secrets context is not available in job-level if: for workflow_dispatch;
    # the MOTHERDUCK_TOKEN env var handles cases where the secret is absent gracefully.
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Smoke: RO share accessible ────────────────────────────────────────
      - name: Smoke test — RO share accessible
        run: |
          python -c "
          from motherduck_client import MotherDuckClient, MotherDuckConfig
          config = MotherDuckConfig(
              database='thyroid_research_2026',
              share_path='md:_share/thyroid_research_ro/7962a053-3581-4ebf-abf6-57af957efb1c'
          )
          client = MotherDuckClient(config)
          con = client.connect_ro_share()
          n = con.execute('SELECT COUNT(DISTINCT research_id) FROM master_cohort').fetchone()[0]
          assert n > 10000, f'Expected 11k+ patients, got {n}'
          print(f'RO share OK: {n:,} patients')
          con.close()
          "

      # ── Canonical table existence ─────────────────────────────────────────
      - name: Check canonical tables exist
        run: |
          python -c "
          import os, duckdb
          token = os.environ['MOTHERDUCK_TOKEN']
          con = duckdb.connect(f'md:thyroid_research_2026?motherduck_token={token}')

          REQUIRED_TABLES = [
              'master_cohort',
              'manuscript_cohort_v1',
              'patient_analysis_resolved_v1',
              'episode_analysis_resolved_v1_dedup',
              'thyroid_scoring_py_v1',
              'analysis_cancer_cohort_v1',
              'operative_episode_detail_v2',
              'rai_treatment_episode_v2',
              'molecular_test_episode_v2',
              'survival_cohort_enriched',
              'streamlit_patient_header_v',
              'longitudinal_lab_canonical_v1',
          ]
          missing = []
          for tbl in REQUIRED_TABLES:
              try:
                  con.execute(f'SELECT 1 FROM {tbl} LIMIT 1')
              except Exception:
                  missing.append(tbl)
          con.close()
          if missing:
              print('MISSING CANONICAL TABLES:', missing)
              exit(1)
          print(f'All {len(REQUIRED_TABLES)} canonical tables exist')
          "

      # ── 11 canonical manuscript metrics ──────────────────────────────────
      - name: Canonical metric reproducibility
        run: |
          python -c "
          import os, duckdb
          token = os.environ['MOTHERDUCK_TOKEN']
          con = duckdb.connect(f'md:thyroid_research_2026?motherduck_token={token}')

          METRICS = [
              ('surgical_cohort',    'SELECT COUNT(DISTINCT research_id) FROM master_cohort',                              10500, 12000),
              ('cancer_cohort',      'SELECT COUNT(*) FROM analysis_cancer_cohort_v1',                                      3900, 4300),
              ('manuscript_cohort',  'SELECT COUNT(*) FROM manuscript_cohort_v1',                                          10500, 11200),
              ('dedup_episodes',     'SELECT COUNT(*) FROM episode_analysis_resolved_v1_dedup',                             9000, 9800),
              ('molecular_tested',   'SELECT COUNT(DISTINCT research_id) FROM molecular_test_episode_v2 WHERE platform IS NOT NULL', 700, 1500),
              ('rai_received',       'SELECT COUNT(DISTINCT research_id) FROM rai_treatment_episode_v2',                     700, 1000),
              ('tirads_patients',    'SELECT COUNT(*) FROM extracted_tirads_validated_v1',                                  3000, 4000),
              ('braf_positive',      'SELECT COUNT(DISTINCT research_id) FROM extracted_braf_recovery_v1 WHERE braf_recovered_status_v11=''positive''', 400, 700),
              ('operative_episodes', 'SELECT COUNT(*) FROM operative_episode_detail_v2',                                    8000, 12000),
              ('survival_cohort',    'SELECT COUNT(*) FROM survival_cohort_enriched',                                      40000, 70000),
              ('scoring_patients',   'SELECT COUNT(*) FROM thyroid_scoring_py_v1',                                         10500, 11500),
          ]

          failures = []
          for name, sql, lo, hi in METRICS:
              try:
                  v = con.execute(sql).fetchone()[0]
                  if not (lo <= int(v) <= hi):
                      failures.append(f'{name}: {v} not in [{lo},{hi}]')
                  else:
                      print(f'  OK {name}: {int(v):,}')
              except Exception as e:
                  failures.append(f'{name}: ERROR {e}')
          con.close()
          if failures:
              print('METRIC FAILURES:', failures)
              exit(1)
          print(f'All {len(METRICS)} canonical metrics in range')
          "

      # ── Row multiplication check ──────────────────────────────────────────
      - name: No row multiplication in patient/episode tables
        run: |
          python -c "
          import os, duckdb
          token = os.environ['MOTHERDUCK_TOKEN']
          con = duckdb.connect(f'md:thyroid_research_2026?motherduck_token={token}')

          dupl = con.execute('SELECT COUNT(*) - COUNT(DISTINCT research_id) FROM patient_analysis_resolved_v1').fetchone()[0]
          assert dupl == 0, f'patient_analysis_resolved_v1 has {dupl} duplicate research_ids'

          sur_dupl = con.execute('''
              SELECT COUNT(*) - COUNT(DISTINCT research_id || chr(30) || COALESCE(surgery_episode_id::VARCHAR, chr(31)))
              FROM episode_analysis_resolved_v1_dedup
          ''').fetchone()[0]
          assert sur_dupl == 0, f'episode_dedup has {sur_dupl} duplicate (patient,episode) pairs'

          mc_dupl = con.execute('SELECT COUNT(*) - COUNT(DISTINCT research_id) FROM manuscript_cohort_v1').fetchone()[0]
          assert mc_dupl == 0, f'manuscript_cohort_v1 has {mc_dupl} duplicate research_ids'

          print('Row multiplication check: PASS')
          con.close()
          "

      # ── Non-null thresholds for core columns ──────────────────────────────
      - name: Core columns non-null check
        run: |
          python -c "
          import os, duckdb
          token = os.environ['MOTHERDUCK_TOKEN']
          con = duckdb.connect(f'md:thyroid_research_2026?motherduck_token={token}')

          checks = [
              ('manuscript_cohort_v1',              'research_id', 0.0),
              ('patient_analysis_resolved_v1',      'research_id', 0.0),
              ('episode_analysis_resolved_v1_dedup','research_id', 0.0),
              ('thyroid_scoring_py_v1',             'research_id', 0.0),
              ('operative_episode_detail_v2',       'research_id', 0.0),
          ]

          failures = []
          for tbl, col, max_pct in checks:
              row = con.execute(f'SELECT ROUND(100.0*COUNT(*) FILTER (WHERE {col} IS NULL)/NULLIF(COUNT(*),0),2) FROM {tbl}').fetchone()
              pct = float(row[0]) if row and row[0] is not None else 0.0
              if pct > max_pct:
                  failures.append(f'{tbl}.{col}: {pct}% null (max {max_pct}%)')
              else:
                  print(f'  OK {tbl}.{col}: {pct}% null')
          con.close()
          if failures:
              print('NULL FAILURES:', failures)
              exit(1)
          "

      # ── Dashboard critical-path query smoke tests ─────────────────────────
      - name: Dashboard critical path queries
        run: |
          python -c "
          import os, duckdb, time
          token = os.environ['MOTHERDUCK_TOKEN']
          con = duckdb.connect(f'md:thyroid_research_2026?motherduck_token={token}')

          QUERIES = [
              ('streamlit_header',  'SELECT COUNT(*) FROM streamlit_patient_header_v',   10000),
              ('date_rescue',       'SELECT COUNT(*) FROM date_rescue_rate_summary',          1),
              ('scoring_t_stage',   'SELECT COUNT(*) FROM thyroid_scoring_py_v1 WHERE ajcc8_t_stage IS NOT NULL', 3000),
          ]

          failures = []
          for label, sql, min_rows in QUERIES:
              try:
                  v = con.execute(sql).fetchone()[0]
                  if int(v) < min_rows:
                      failures.append(f'{label}: {v} rows < {min_rows}')
                  else:
                      print(f'  OK {label}: {int(v):,} rows')
              except Exception as e:
                  failures.append(f'{label}: ERROR {e}')
          con.close()
          if failures:
              print('DASHBOARD FAILURES:', failures)
              exit(1)
          print('Dashboard smoke tests: PASS')
          "

      # ── NEW: Manuscript source-env check ─────────────────────────────────
      - name: Manuscript source-env verification
        run: |
          python -c "
          import os, duckdb
          token = os.environ['MOTHERDUCK_TOKEN']
          con = duckdb.connect(f'md:thyroid_research_2026?motherduck_token={token}')
          db = con.execute('SELECT current_database()').fetchone()[0]
          expected = 'thyroid_research_2026'
          assert db == expected, f'manuscript source => {db!r}, expected {expected!r}'
          print(f'Manuscript source DB: {db!r} — PASS')
          con.close()
          "

      # ── NEW: Release manifest freshness check (warn, non-blocking) ────────
      - name: Release manifest freshness
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          latest = Path('exports/release_manifests/LATEST_MANIFEST.json')
          if not latest.exists():
              print('WARN: No release manifest found (run scripts/96_release_manifest.py --md to generate)')
              sys.exit(0)
          m = json.loads(latest.read_text())
          print(f'Latest manifest: {m[\"manifest_id\"]}  status={m[\"overall_status\"]}  sha={m[\"git_sha\"]}')
          if m['overall_status'] == 'BLOCKED':
              print('WARN: Latest manifest is BLOCKED — check metrics before tagging a release')
          sys.exit(0)
          "
        continue-on-error: true

  # ── Job 4: Query Benchmark Regression (every push, non-blocking on missing baseline)
  benchmark-regression:
    name: Query Benchmark Regression
    runs-on: ubuntu-latest
    needs: motherduck-ci
    # NOTE: secrets not available in job if: for workflow_dispatch; env handles missing token.
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run benchmark suite
        run: |
          python scripts/92_query_benchmark.py \
            --md \
            --baseline exports/md_benchmark_20260314/benchmark_baseline.csv \
            --runs 3
        # Non-fatal: regressions print a summary but do not block the push.
        # To promote a regression to a hard failure, change the exit code in
        # 92_query_benchmark.py (REGRESSION_EXIT_CODE = 1).
        continue-on-error: true

      - name: Upload benchmark results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.sha }}
          path: exports/md_benchmark_*/benchmark_results_*.csv
          retention-days: 30

  # ── Job 5: RO Share Publication Check (tagged releases + manual dispatch) ─
  share-publication-check:
    name: RO Share Publication Check
    runs-on: ubuntu-latest
    needs: motherduck-ci
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.run_share_check == 'true'
    env:
      MD_SA_TOKEN: ${{ secrets.MD_SA_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run share publication check
        # Skip the RW cross-count step in CI (requires both SA and personal
        # token); use --no-count-check to only verify table existence, PHI
        # columns absent, and catalog alias.
        run: |
          python scripts/94_share_publication_check.py \
            --sa \
            --no-count-check

  # ── Job 6: Promotion Gate  (tagged releases only; dev→qa→prod guard) ──────
  promotion-gate:
    name: Promotion Gate (qa → prod)
    runs-on: ubuntu-latest
    needs: [motherduck-ci, share-publication-check]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      MD_SA_TOKEN: ${{ secrets.MD_SA_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run promotion gate (qa → prod)
        # Exit codes: 0 = PASS (all gates), 1 = GATE FAIL (blocks release),
        # 2 = connectivity error.
        run: |
          python scripts/91_promotion_gate.py \
            --from qa \
            --to prod \
            --sa
